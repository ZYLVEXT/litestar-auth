# Zensical documentation config.
# See https://zylvext.github.io/litestar-auth/
# Zensical reference: https://github.com/zensical/docs

[project]
site_name = "litestar-auth"
site_description = "Authentication and authorization library for Litestar — registration, login, OAuth2, 2FA, and user management out of the box."
site_url = "https://zylvext.github.io/litestar-auth/"
site_author = "Vladislav Shepilov"
copyright = "Copyright &copy; 2026 Vladislav Shepilov"
docs_dir = "docs"
site_dir = "site"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = [
    "install.md",
    "quickstart.md",
  ] },
  { "Concepts" = [
    "concepts/architecture.md",
    "concepts/backends.md",
    "concepts/request_lifecycle.md",
  ] },
  { "Guides" = [
    "guides/security.md",
    "guides/registration.md",
    "guides/oauth.md",
    "guides/totp.md",
    "guides/rate_limiting.md",
    "guides/from_fastapi_users.md",
    "guides/hooks.md",
    "guides/extending.md",
  ] },
  { "Cookbook" = [
    "cookbook/cookie_csrf.md",
    "cookbook/refresh_cookie.md",
    "cookbook/oauth_associate.md",
  ] },
  { "HTTP API" = "http_api.md" },
  { "Configuration" = "configuration.md" },
  { "Errors" = "errors.md" },
  { "Security" = "security.md" },
  { "Deployment" = "deployment.md" },
  { "Project" = [
    "roadmap.md",
    "contributing.md",
  ] },
  { "Python API" = [
    "api/package.md",
    "api/controllers.md",
    "api/plugin.md",
    "api/authentication.md",
    "api/manager.md",
    "api/models.md",
    "api/schemas.md",
    "api/types.md",
    "api/db.md",
    "api/password.md",
    "api/guards.md",
    "api/exceptions.md",
    "api/transports.md",
    "api/strategies.md",
    "api/ratelimit.md",
    "api/totp.md",
    "api/oauth.md",
    "api/contrib_redis.md",
  ] },
]

[project.repository]
name = "litestar-auth"
url = "https://github.com/ZYLVEXT/litestar-auth"
edit_uri = "edit/main/docs/"

[project.theme]
variant = "classic"
language = "en"
icon.repo = "fontawesome/brands/github"

features = [
  "search.suggest",
  "search.highlight",
  "content.tabs.link",
  "content.code.copy",
  "content.action.edit",
  "content.action.view",
  "navigation.tracking",
  "navigation.top",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "slate"
primary = "indigo"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "default"
primary = "indigo"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
line_spans = "__span"

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.plugins.autorefs]

[project.plugins.mkdocstrings.handlers.python]
paths = ["."]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
merge_init_into_class = true
show_if_no_docstring = false
