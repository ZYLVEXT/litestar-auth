name: Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "*.*.*"
    paths:
      - "litestar_auth/**"
      - "tests/**"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - "justfile"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "litestar_auth/**"
      - "tests/**"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - "justfile"
      - ".github/workflows/**"

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VENV_PRECOMMIT_CACHE_VERSION: v1

jobs:
  pre-commit:
    if: github.event.repository.fork == false
    name: Pre-commit
    runs-on: ubuntu-latest
    env:
      UV_PYTHON_PREFERENCE: only-managed
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set uv Python install dir
        run: echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python-dir" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: "3.12"
          enable-cache: true
          cache-python: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore .venv cache (pre-commit)
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .venv
          key: venv-precommit-${{ env.VENV_PRECOMMIT_CACHE_VERSION }}-${{ runner.os }}-3.12-${{ github.run_id }}
          restore-keys: |
            venv-precommit-${{ env.VENV_PRECOMMIT_CACHE_VERSION }}-${{ runner.os }}-3.12-

      - name: Install the project
        run: uv sync --frozen --all-extras --group dev

      - name: Save .venv cache (pre-commit)
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .venv
          key: venv-precommit-${{ env.VENV_PRECOMMIT_CACHE_VERSION }}-${{ runner.os }}-3.12-${{ github.run_id }}

      - name: Run pre-commit (uv-managed)
        run: uv run --no-sync pre-commit run --show-diff-on-failure --color=always --all-files
        env:
          SKIP: "detect-aws-credentials,no-commit-to-branch"

  dependency-audit:
    if: github.event.repository.fork == false
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: [pre-commit]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: "3.12"
          enable-cache: true
          cache-python: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dev dependencies
        run: uv sync --frozen --all-extras --group dev

      - name: Export hashed production requirements
        run: |
          uv export \
            --frozen \
            --format requirements.txt \
            --no-dev \
            --no-emit-project \
            --output-file /tmp/litestar-auth-security-requirements.txt

      - name: Audit production dependencies
        run: uv run pip-audit --require-hashes -r /tmp/litestar-auth-security-requirements.txt

      - name: Check dependency declarations (deptry)
        run: uv run deptry .

  test:
    name: Test (${{ matrix.python-version }} on ${{ matrix.os }})
    needs: [pre-commit]
    runs-on: ${{ matrix.os }}
    if: github.event.repository.fork == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add .local/bin to Windows PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "$USERPROFILE/.local/bin" >> "$GITHUB_PATH"

      - name: Clear Python install dir (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: rm -rf "${UV_PYTHON_INSTALL_DIR:-}" 2>/dev/null || true

      - name: Set up Python
        shell: bash
        run: uv python install ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --frozen --all-extras --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Detect dead fixtures
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run pytest --deadfixtures

      - name: Run tests (with coverage on Ubuntu / Python 3.12)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.python-version }}" = "3.12" ]; then
            uv run pytest --cov=litestar_auth --cov-branch --cov-report=term-missing --cov-fail-under=97
          else
            uv run pytest
          fi
